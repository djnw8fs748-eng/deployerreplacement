name: Integration Tests

# Runs daily (03:00 UTC) and on manual trigger.
# Each app is tested in its own matrix job: stackr renders the compose,
# Docker starts the container, and we assert the service responds.
#
# Skipped / removed apps:
#   traefik          — removed from catalog; NPM is the sole reverse proxy
#   pihole           — conflicts with adguardhome on host port 53
#   adguardhome      — conflicts with systemd-resolved on host port 53 (GitHub Actions runner)
#   authelia         — removed from catalog
#   authentik        — removed from catalog
#   headscale        — requires a config.yaml file pre-mounted at /etc/headscale
#   gluetun          — requires live VPN credentials
#   dasherr          — removed from catalog
#   nextcloud        — removed from catalog
#   sabnzbd          — removed from catalog
#   transmission     — removed from catalog
#   jellyseerr       — removed from catalog; replaced by seerr
#   overseerr        — removed from catalog; replaced by seerr
#   freshrss         — removed from catalog (productivity category removed)
#   gitea            — removed from catalog (productivity category removed)
#   miniflux         — removed from catalog (productivity category removed)
#   paperless-ngx    — removed from catalog (productivity category removed)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

# Dummy credentials for apps that read secrets from environment variables.
# Docker Compose expands ${VAR} from the environment — these values are
# intentionally fake and only sufficient to allow containers to start.
env:
  FLAME_PASSWORD: ci-integration-test
  GRAFANA_ADMIN_PASSWORD: ci-integration-test
  MARIADB_PASSWORD: ci-integration-test
  MARIADB_ROOT_PASSWORD: ci-integration-test
  MONGO_ROOT_PASSWORD: ci-integration-test
  MONGO_ROOT_USERNAME: ci-root
  OPENWEBUI_SECRET_KEY: ci-integration-test
  POCKET_ID_ENCRYPTION_KEY: ci-integration-test-encryption-key-32ch
  POSTGRES_PASSWORD: ci-integration-test
  TINYAUTH_OAUTH_CLIENT_ID: ci-integration-test
  TINYAUTH_OAUTH_CLIENT_SECRET: ci-integration-test
  DUPLICATI_SETTINGS_ENCRYPTION_KEY: ci-integration-test
  VAULTWARDEN_ADMIN_TOKEN: ci-integration-test

jobs:
  deploy-test:
    name: "Deploy: ${{ matrix.app }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # run all apps even if one fails
      matrix:
        include:
          # ----------------------------------------------------------------
          # Proxy / Network
          # ----------------------------------------------------------------
          # nginx-proxy-manager binds port 81 (admin UI) directly on the host
          - app: nginx-proxy-manager
            host_port: 81
            health_url: "http://localhost:81/"

          # wireguard is a UDP VPN tunnel — verify it reaches running state
          - app: wireguard
            health_type: running

          # ----------------------------------------------------------------
          # AI
          # ----------------------------------------------------------------
          - app: ollama
            container_port: 11434
            health_path: "/"

          - app: open-webui
            container_port: 8080
            health_path: "/"

          # ----------------------------------------------------------------
          # Media
          # ----------------------------------------------------------------
          - app: plex
            host_port: 32400
            health_url: "http://localhost:32400/"

          - app: jellyfin
            container_port: 8096
            health_path: "/"

          - app: sonarr
            container_port: 8989
            health_path: "/ping"

          - app: radarr
            container_port: 7878
            health_path: "/ping"

          - app: lidarr
            container_port: 8686
            health_path: "/ping"

          - app: readarr
            container_port: 8787
            health_path: "/ping"

          - app: prowlarr
            container_port: 9696
            health_path: "/ping"

          - app: bazarr
            container_port: 6767
            health_path: "/"

          - app: seerr
            container_port: 5055
            health_path: "/"

          - app: qbittorrent
            container_port: 8080
            health_path: "/"

          - app: tdarr
            container_port: 8265
            health_path: "/"

          # ----------------------------------------------------------------
          # Management / Dashboard
          # ----------------------------------------------------------------
          - app: homepage
            container_port: 3000
            health_path: "/"

          - app: heimdall
            container_port: 80
            health_path: "/"

          - app: flame
            container_port: 5005
            health_path: "/"

          - app: dozzle
            container_port: 8080
            health_path: "/"

          # portainer serves HTTPS on 9443
          - app: portainer
            container_port: 9443
            health_path: "/"
            health_proto: https

          # watchtower is a daemon with no web UI — verify running state
          - app: watchtower
            health_type: running

          # ----------------------------------------------------------------
          # Monitoring
          # ----------------------------------------------------------------
          - app: uptime-kuma
            container_port: 3001
            health_path: "/"

          - app: grafana
            container_port: 3000
            health_path: "/api/health"

          - app: prometheus
            container_port: 9090
            health_path: "/-/healthy"

          - app: loki
            container_port: 3100
            health_path: "/ready"

          - app: netdata
            container_port: 19999
            health_path: "/"

          # ----------------------------------------------------------------
          # Security
          # ----------------------------------------------------------------
          - app: vaultwarden
            container_port: 80
            health_path: "/"

          # socket-proxy lives on the socket_proxy network, not proxy
          - app: socket-proxy
            container_port: 2375
            health_path: "/version"
            network_name: socket_proxy

          # crowdsec is a log-analysis daemon — verify running state
          - app: crowdsec
            health_type: running

          - app: pocket-id
            container_port: 1411
            health_path: "/"

          - app: tinyauth
            container_port: 3000
            health_path: "/"

          # ----------------------------------------------------------------
          # Databases  (TCP port reachability check — no HTTP interface)
          # ----------------------------------------------------------------
          - app: postgres
            tcp_port: 5432

          - app: mariadb
            tcp_port: 3306

          - app: redis
            tcp_port: 6379

          - app: mongo
            tcp_port: 27017

          # ----------------------------------------------------------------
          # Gaming
          # ----------------------------------------------------------------
          - app: minecraft
            tcp_port: 25565

          # ----------------------------------------------------------------
          # Storage
          # ----------------------------------------------------------------
          - app: filebrowser
            container_port: 80
            health_path: "/"

          - app: duplicati
            container_port: 8200
            health_path: "/"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install stackr
        run: uv pip install --system -e ".[dev]"

      # proxy is used by most apps; socket_proxy is used by socket-proxy itself.
      - name: Create Docker networks
        run: |
          docker network create proxy || true
          docker network create socket_proxy || true

      # Create host directories that compose templates bind-mount.
      # crowdsec reads traefik access logs; create that path so the mount succeeds.
      # Pre-create config/data subdirs so Docker doesn't create them as root (which
      # would cause permission denied errors for containers that run as non-root).
      - name: Create required host directories
        run: |
          sudo mkdir -p /opt/appdata/${{ matrix.app }}/config
          sudo mkdir -p /opt/appdata/${{ matrix.app }}/data
          sudo mkdir -p /opt/appdata/traefik/logs
          sudo mkdir -p /tv /movies /downloads /media /books /music
          sudo mkdir -p /downloads/complete /downloads/incomplete
          sudo mkdir -p /backups /source
          sudo chmod -R 777 /opt/appdata /tv /movies /downloads /media /books /music /backups /source
          # prometheus requires a config file to start — create a minimal one
          if [ "${{ matrix.app }}" = "prometheus" ]; then
            sudo mkdir -p /opt/appdata/prometheus/config
            printf 'global:\n  scrape_interval: 15s\n' | sudo tee /opt/appdata/prometheus/config/prometheus.yml
          fi

      # Render the compose file using stackr's Python API.
      # extra_vars allows per-app overrides.
      - name: Render compose via stackr
        env:
          EXTRA_VARS: ${{ matrix.extra_vars || '{}' }}
        run: |
          python - << 'PYEOF'
          import json, os, sys
          from pathlib import Path
          from stackr.catalog import Catalog
          from stackr.config import AppConfig, StackrConfig
          from stackr.renderer import render_app

          app_name = "${{ matrix.app }}"
          extra_vars = json.loads(os.environ.get("EXTRA_VARS", "{}"))

          config = StackrConfig.model_validate({
              "global": {
                  "data_dir": "/opt/appdata",
                  "timezone": "UTC",
                  "puid": 1000,
                  "pgid": 1000,
              },
              "network": {
                  "domain": "test.com",
                  "local_domain": "home.test.com",
              },
              "security": {"socket_proxy": False},
          })

          catalog = Catalog()
          catalog_app = catalog.get(app_name)
          if catalog_app is None:
              print(f"ERROR: '{app_name}' not found in catalog", file=sys.stderr)
              sys.exit(1)

          rendered = render_app(AppConfig(name=app_name, vars=extra_vars), catalog_app, config)

          out = Path(f"/tmp/stackr-ci/{app_name}/docker-compose.yml")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(rendered)

          print(f"Rendered compose for {app_name}:")
          print(rendered)
          PYEOF

      - name: Start containers
        run: |
          docker compose \
            -f /tmp/stackr-ci/${{ matrix.app }}/docker-compose.yml \
            up -d

      # Health check strategy depends on matrix fields:
      #   health_type: running  — daemon apps; just verify container state
      #   host_port + health_url — apps that bind a host port directly
      #   tcp_port              — databases / game servers; nc TCP probe
      #   container_port        — all other web apps; curl via container IP
      #     health_proto: https — use curl -k for self-signed TLS (portainer)
      #     network_name        — override network for IP lookup (socket-proxy)
      #     container_name      — override container name for IP lookup (authentik)
      - name: Wait for service and assert health
        timeout-minutes: 8
        run: |
          APP="${{ matrix.app }}"
          CONTAINER="${{ matrix.container_name || matrix.app }}"
          HOST_PORT="${{ matrix.host_port }}"
          CONTAINER_PORT="${{ matrix.container_port }}"
          TCP_PORT="${{ matrix.tcp_port }}"
          HEALTH_PATH="${{ matrix.health_path }}"
          HEALTH_PROTO="${{ matrix.health_proto || 'http' }}"
          HEALTH_TYPE="${{ matrix.health_type }}"
          NETWORK="${{ matrix.network_name || 'proxy' }}"
          MAX=420  # generous timeout for slow-starting apps
          ELAPSED=0

          # --- running check: daemon with no port ---
          if [ "$HEALTH_TYPE" = "running" ]; then
            echo "Waiting for $APP container to reach running state..."
            until [ "$(docker inspect -f '{{.State.Status}}' "$CONTAINER" 2>/dev/null)" = "running" ]; do
              if [ "$ELAPSED" -ge "$MAX" ]; then
                echo "TIMEOUT: $APP did not reach running state within ${MAX}s"
                exit 1
              fi
              echo "  waiting... (${ELAPSED}s elapsed)"
              sleep 5; ELAPSED=$((ELAPSED + 5))
            done
            echo "PASS: $APP is $(docker inspect -f '{{.State.Status}}' "$CONTAINER")"
            exit 0
          fi

          # --- host port check: app binds a port directly on the runner ---
          if [ -n "$HOST_PORT" ]; then
            HEALTH_URL="${{ matrix.health_url }}"
            echo "Polling $HEALTH_URL ..."
            until curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null \
                | grep -qE '^[23]'; do
              if [ "$ELAPSED" -ge "$MAX" ]; then
                echo "TIMEOUT: $APP did not respond at $HEALTH_URL within ${MAX}s"
                exit 1
              fi
              echo "  waiting... (${ELAPSED}s elapsed)"
              sleep 10; ELAPSED=$((ELAPSED + 10))
            done
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            echo "PASS: $APP → $HEALTH_URL → HTTP $HTTP"
            exit 0
          fi

          # Resolve container IP for remaining checks
          echo "Resolving IP for container '$CONTAINER' on network '$NETWORK'..."
          until CONTAINER_IP=$(
            docker inspect \
              -f "{{(index .NetworkSettings.Networks \"$NETWORK\").IPAddress}}" \
              "$CONTAINER" 2>/dev/null
          ) && [ -n "$CONTAINER_IP" ]; do
            if [ "$ELAPSED" -ge 60 ]; then
              # Fall back to first assigned IP across any network
              CONTAINER_IP=$(
                docker inspect \
                  -f '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' \
                  "$CONTAINER" 2>/dev/null \
                | tr ' ' '\n' | grep -v '^$' | head -1
              )
              [ -n "$CONTAINER_IP" ] && break
              echo "ERROR: could not determine IP for $CONTAINER"
              exit 1
            fi
            sleep 5; ELAPSED=$((ELAPSED + 5))
          done
          echo "Container IP: $CONTAINER_IP"

          # --- TCP check: databases and game servers ---
          if [ -n "$TCP_PORT" ]; then
            echo "Waiting for TCP $CONTAINER_IP:$TCP_PORT ..."
            until nc -z -w5 "$CONTAINER_IP" "$TCP_PORT" 2>/dev/null; do
              if [ "$ELAPSED" -ge "$MAX" ]; then
                echo "TIMEOUT: TCP $CONTAINER_IP:$TCP_PORT not reachable within ${MAX}s"
                exit 1
              fi
              echo "  waiting... (${ELAPSED}s elapsed)"
              sleep 10; ELAPSED=$((ELAPSED + 10))
            done
            echo "PASS: $APP → TCP $CONTAINER_IP:$TCP_PORT is open"
            exit 0
          fi

          # --- HTTP/HTTPS check via container IP ---
          HEALTH_URL="${HEALTH_PROTO}://${CONTAINER_IP}:${CONTAINER_PORT}${HEALTH_PATH}"
          if [ "$HEALTH_PROTO" = "https" ]; then
            CURL_FLAGS="-sfk"
          else
            CURL_FLAGS="-sf"
          fi
          echo "Polling $HEALTH_URL ..."
          until curl $CURL_FLAGS -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null \
              | grep -qE '^[23]'; do
            if [ "$ELAPSED" -ge "$MAX" ]; then
              echo "TIMEOUT: $APP did not respond at $HEALTH_URL within ${MAX}s"
              exit 1
            fi
            echo "  waiting... (${ELAPSED}s elapsed)"
            sleep 10; ELAPSED=$((ELAPSED + 10))
          done
          HTTP=$(curl $CURL_FLAGS -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          echo "PASS: $APP → $HEALTH_URL → HTTP $HTTP"

      # Always print logs — useful for diagnosing failures
      - name: Print container logs
        if: always()
        run: |
          docker compose \
            -f /tmp/stackr-ci/${{ matrix.app }}/docker-compose.yml \
            logs --no-color || true

      # Always tear down — containers, networks created by compose, and named volumes
      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f /tmp/stackr-ci/${{ matrix.app }}/docker-compose.yml \
            down -v --remove-orphans || true
