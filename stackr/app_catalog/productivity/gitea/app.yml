name: gitea
display_name: Gitea
description: Lightweight self-hosted Git service with issue tracking and CI/CD
category: productivity
homepage: https://gitea.io
version: latest
exposure: external
requires: []
suggests:
  - traefik
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  ssh_port:
    type: integer
    default: 22
    description: Host port for SSH git access
ports:
  - 3000
host_ports:
  - 22
volumes:
  - name: data
    path: /data
