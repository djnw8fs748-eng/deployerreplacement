name: miniflux
display_name: Miniflux
description: Minimalist and opinionated RSS feed reader
category: productivity
homepage: https://miniflux.app
version: latest
exposure: external
requires:
  - traefik
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  admin_username:
    type: string
    default: admin
    description: Admin account username
ports:
  - 8080
host_ports: []
volumes: []
