name: grafana
display_name: Grafana
description: Open source analytics and monitoring platform with beautiful dashboards
category: monitoring
homepage: https://grafana.com
version: latest
suggests:
  - prometheus
  - loki
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  admin_user:
    type: string
    default: admin
    description: Grafana admin username
  anonymous_access:
    type: boolean
    default: false
    description: Allow unauthenticated read-only access to dashboards
ports:
  - 3000
host_ports: []
volumes:
  - name: data
    path: /var/lib/grafana
