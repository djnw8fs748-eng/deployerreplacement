name: vaultwarden
display_name: Vaultwarden
description: Unofficial Bitwarden-compatible server written in Rust
category: security
homepage: https://github.com/dani-garcia/vaultwarden
version: latest
exposure: external
requires:
  - traefik
vars:
  admin_token:
    type: string
    default: ""
    description: Admin panel token (leave blank to auto-generate)
ports:
  - 80
volumes:
  - name: data
    path: /data
