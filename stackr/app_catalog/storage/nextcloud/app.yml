name: nextcloud
display_name: Nextcloud
description: Self-hosted productivity platform for file sync, sharing, and collaboration
category: storage
homepage: https://nextcloud.com
version: "29"
exposure: external
requires: []
suggests:
  - traefik
vars:
  version:
    type: select
    options: ["27", "28", "29"]
    default: "29"
    description: Nextcloud major version
  admin_user:
    type: string
    default: admin
    description: Initial admin username
ports:
  - 80
host_ports: []
volumes:
  - name: html
    path: /var/www/html
  - name: data
    path: /var/www/html/data
    external: true
