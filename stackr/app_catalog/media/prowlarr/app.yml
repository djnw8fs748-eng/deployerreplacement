name: prowlarr
display_name: Prowlarr
description: Indexer manager and proxy for Sonarr, Radarr, and other *arr apps
category: media
homepage: https://github.com/Prowlarr/Prowlarr
version: latest
exposure: external
requires: []
suggests:
  - traefik
  - sonarr
  - radarr
  - lidarr
  - readarr
ports:
  - 9696
volumes:
  - name: config
    path: /config
