name: jellyseerr
display_name: Jellyseerr
description: Request management and media discovery tool for Jellyfin ecosystems
category: media
homepage: https://docs.jellyseerr.dev
version: latest
exposure: external
requires:
  - traefik
suggests:
  - sonarr
  - radarr
  - jellyfin
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
ports:
  - 5055
host_ports: []
volumes:
  - name: config
    path: /app/config
