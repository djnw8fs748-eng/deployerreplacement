name: qbittorrent
display_name: qBittorrent
description: Free and open source BitTorrent client with a web UI
category: media
homepage: https://www.qbittorrent.org
version: latest
exposure: external
requires: []
suggests:
  - traefik
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  webui_port:
    type: integer
    default: 8080
    description: Web UI port
ports:
  - 8080
host_ports: []
volumes:
  - name: config
    path: /config
  - name: downloads
    path: /downloads
    external: true
