name: traefik
display_name: Traefik
description: Cloud-native reverse proxy and load balancer with automatic SSL
category: network
homepage: https://traefik.io
version: "3"
exposure: external
requires: []
suggests:
  - socket-proxy
ports:
  - 80
  - 443
host_ports:
  - 80
  - 443
volumes:
  - name: config
    path: /etc/traefik
  - name: acme
    path: /etc/traefik/acme
