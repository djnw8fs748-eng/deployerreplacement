name: crowdsec
display_name: CrowdSec
description: Open-source cybersecurity platform with crowd-sourced IP reputation and Traefik bouncer
category: security
homepage: https://crowdsec.net
version: latest
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  collections:
    type: string
    default: "crowdsecurity/traefik crowdsecurity/http-cve"
    description: Space-separated CrowdSec collections to install (e.g. crowdsecurity/nginx crowdsecurity/linux)
requires: []
suggests:
  - socket-proxy
ports: []
volumes:
  - name: config
    path: /etc/crowdsec
  - name: data
    path: /var/lib/crowdsec/data
host_ports: []
