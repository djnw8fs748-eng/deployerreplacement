name: authentik
display_name: Authentik
description: Open-source identity provider with SSO, OAuth2, SAML and forward auth for Traefik
category: security
homepage: https://goauthentik.io
version: "2024.10"
exposure: external
requires:
  - traefik
suggests:
  - socket-proxy
ports:
  - 9000
vars:
  version:
    type: string
    default: "2024.10"
    description: Authentik version tag (server and worker use the same tag)
volumes:
  - name: media
    path: /media
  - name: custom-templates
    path: /templates
  - name: geoip
    path: /geoip
