name: readarr
display_name: Readarr
description: Book manager for Usenet and BitTorrent users
category: media
homepage: https://readarr.com
version: nightly
suggests:
  - prowlarr
vars:
  version:
    type: string
    default: nightly
    description: Docker image tag
ports:
  - 8787
host_ports: []
volumes:
  - name: config
    path: /config
  - name: books
    path: /books
    external: true
  - name: downloads
    path: /downloads
    external: true
