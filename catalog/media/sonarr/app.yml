name: sonarr
display_name: Sonarr
description: TV series collection manager for Usenet and BitTorrent users
category: media
homepage: https://sonarr.tv
version: latest
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
requires: []
suggests:
  - prowlarr
ports:
  - 8989
volumes:
  - name: config
    path: /config
  - name: tv
    path: /tv
    external: true
  - name: downloads
    path: /downloads
    external: true
