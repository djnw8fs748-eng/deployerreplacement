name: qbittorrent
display_name: qBittorrent
description: Free and open source BitTorrent client with a web UI
category: media
homepage: https://www.qbittorrent.org
version: latest
exposure: external
requires: []
suggests:
  - traefik
  - gluetun
vars:
  version:
    type: string
    default: latest
    description: Docker image tag
  webui_port:
    type: integer
    default: 8080
    description: Web UI port
  use_vpn:
    type: boolean
    default: false
    description: Route all traffic through Gluetun VPN (requires gluetun app enabled)
ports:
  - 8080
host_ports:
  - 6881
volumes:
  - name: config
    path: /config
  - name: downloads
    path: /downloads
    external: true
